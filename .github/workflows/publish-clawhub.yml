name: Publish to ClawHub

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Publish to ClawHub
        run: npx clawhub publish . --token $CLAWHUB_TOKEN
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
