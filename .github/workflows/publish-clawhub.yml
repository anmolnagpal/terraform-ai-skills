name: Publish to ClawHub

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to ClawHub
        run: npx clawhub login --token ${{ secrets.CLAWHUB_TOKEN }}

      - name: Publish to ClawHub
        run: npx clawhub publish .
